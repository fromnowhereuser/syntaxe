<form (ngSubmit)="valid()" [formGroup]="userForm">
    <div class="form-group">
        <label>firstname</label><input  name="firstname" type="text" formControlName="firstname"
            required />
    </div>

    <div class="form-group">
        <label>lastname</label><input  name="lastname" type="text" formControlName="lastname"
            required />
    </div>

    <div>
        <button type="submit">
            valid
        </button>
    </div>
</form>
